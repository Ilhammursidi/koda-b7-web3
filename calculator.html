<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>

<body>
    <input type="text">
    <section>
        <button class="deg down"><span>Deg</span>
            <span>|</span><span>Rad</span></button>
        <button class="down">x!</button><button class="up basic">(</button><button class="up basic">)</button><button
            class="up basic">%</button><button
            class="up basic">AC</button><button class="down">inv</button><button class="down">sin</button><button class="down">in</button><button
            class="gray up">7</button><button class="gray up">8</button><button class="gray up">9</button><button
            class="up basic">÷</button><button class="down">π</button><button class="down">cos</button><button class="down">log</button><button
            class="gray up">4</button><button class="gray up">5</button><button class="gray up">6</button><button
            class="up basic">×</button><button class="down">e</button><button class="down">tan</button><button class="down">√</button><button
            class="gray up">1</button><button class="gray up">2</button><button class="gray up">3</button><button
            class="up basic">-</button><button class="down">Ans</button><button class="down">EXP</button>
        <button class="down">X<sup>y</sup></button>
        <button class="gray up">0</button><button class="gray up">.</button><button class="blue up">=</button><button
            class="up basic">+</button>
    </section>
</body>

</html>
