<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <input type="text">
    <section>
        <button class="deg"><span>Deg</span>
            <span>|</span><span>Rad</span></button>
        <button>x!</button><button class="up">(</button><button class="up">)</button><button class="up">%</button><button class="up">AC</button><button>inv</button><button>sin</button><button>in</button><button class="gray up">7</button><button class="gray up">8</button><button class="gray up">9</button><button class="up">÷</button><button>π</button><button>cos</button><button>log</button><button class="gray up">4</button><button class="gray up">5</button><button class="gray up">6</button><button class="up">×</button><button>e</button><button>tan</button><button>√</button><button class="gray up">1</button><button class="gray up">2</button><button class="gray up">3</button><button class="up">-</button><button>Ans</button><button>EXP</button>
        <button>X<sup>y</sup></button>
        <button class="gray up">0</button><button class="gray up">.</button><button class="blue up">=</button><button class="up">+</button>
    </section>
</body>
</html>
